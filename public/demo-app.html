function drawRecItems(){
  document.getElementById('recItemsBody').innerHTML = editRec.items.map((it,i)=>`<tr>
    <td><input value="${attr(it.description)}" oninput="editRec.items[${i}].description=this.value"></td>
    <td><input type="number" value="${it.qty}" oninput="editRec.items[${i}].qty=this.value;drawRecLadder();recRowTotal(${i})" style="text-align:right"></td>
    <td><input value="${attr(it.unit)}" oninput="editRec.items[${i}].unit=this.value"></td>
    <td><input type="number" value="${it.price}" oninput="editRec.items[${i}].price=this.value;drawRecLadder();recRowTotal(${i})" style="text-align:right"></td>
    <td style="text-align:right;font-variant-numeric:tabular-nums;padding-right:10px" class="rect">${money((Number(it.qty)||0)*(Number(it.price)||0))}</td>
    <td><button class="del" onclick="recDelItem(${i})">×</button></td></tr>`).join('');
}
function recRowTotal(i){ const it=editRec.items[i]; const cell=document.getElementById('recItemsBody').children[i]?.children[4]; if(cell) cell.textContent=money((Number(it.qty)||0)*(Number(it.price)||0)); }
function recAddItem(){ editRec.items.push({description:'',qty:1,unit:'',price:0}); drawRecItems(); drawRecLadder(); }
function recDelItem(i){ editRec.items.splice(i,1); if(!editRec.items.length) recAddItem(); drawRecItems(); drawRecLadder(); }
function recSetWht(x){ editRec.whtRate=x; document.querySelectorAll('#recWhtPills button').forEach(b=>b.classList.toggle('on',b.textContent===x+'%')); drawRecLadder(); }
function drawRecLadder(){ const t=compute(editRec); const b=DB.business;
  document.getElementById('recLadder').innerHTML=`
    <div class="row"><span class="lbl">รวมเป็นเงิน</span><span class="amt">${fmtMoney(t.subtotal)}</span></div>
    ${b.isVatRegistered&&t.vatRate>0?`<div class="row"><span class="lbl">VAT ${t.vatRate}%</span><span class="amt">${fmtMoney(t.vatAmount)}</span></div>`:''}
    <div class="row sub grand"><span class="lbl">ยอดรวมทั้งสิ้น</span><span class="amt">${fmtMoney(t.grandTotal)}</span></div>
    ${t.whtRate>0?`<div class="row minus"><span class="lbl">หัก ณ ที่จ่าย ${t.whtRate}%</span><span class="amt">−${money(t.whtAmount)}</span></div>`:''}
    <div class="row net"><span class="lbl">ยอดชำระสุทธิ</span><span class="amt">${fmtMoney(t.netPayable)}</span></div>`;
}
function saveRecurring(){
  const r=editRec;
  r.items=r.items.filter(it=>(it.description||'').trim()||Number(it.price)>0);
  if(!r.items.length){ toast('เพิ่มอย่างน้อยหนึ่งรายการ','err'); return; }
  if(r.id){ const i=DB.recurring.findIndex(x=>x.id===r.id); DB.recurring[i]=r; }
  else{ r.id=uid(); DB.recurring.push(r); }
  persist(); closeModal(); setView('recurring'); toast('บันทึกรายการประจำแล้ว','ok');
}
function deleteRecurring(id){ if(!confirm('ลบรายการประจำนี้?')) return;
  DB.recurring=DB.recurring.filter(r=>r.id!==id); persist(); closeModal(); setView('recurring'); }
function generateRecurring(id){
  const r=DB.recurring.find(x=>x.id===id);
  const issue = r.nextDate<=todayISO()? r.nextDate : todayISO();
  const inv={id:uid(),type:'invoice',number:nextNumber('invoice',issue),clientId:r.clientId,parentId:null,
    issueDate:issue,dueDate:addDays(issue,30),paidDate:null,status:'draft',project:r.project,
    currency:r.currency||DB.business.currency||'THB',
    items:JSON.parse(JSON.stringify(r.items)),vatRate:r.vatRate,whtRate:r.whtRate,notes:r.notes,
    createdAt:new Date().toISOString(),recurringId:r.id};
  commitNumber('invoice',issue);
  DB.documents.push(inv);
  r.lastGenerated=issue;
  r.nextDate=advanceDate(r.nextDate,r.frequency);
  persist(); viewDoc(inv.id); toast('สร้างใบแจ้งหนี้จากรายการประจำแล้ว — ครั้งถัดไป '+fmtDate(r.nextDate),'ok');
}

/* ---------- YEAR-END TAX SUMMARY ---------- */
let reportYear = new Date().getFullYear();
function docTaxDate(d){ return d.paidDate || d.issueDate || ''; }
function realizedDocs(){ return DB.documents.filter(d=> d.type==='receipt' || d.type==='tax_invoice'); }
function reportYears(){
  const ys = new Set(realizedDocs().map(d=> new Date(docTaxDate(d)).getFullYear()).filter(y=>!isNaN(y)));
  ys.add(new Date().getFullYear());
  return [...ys].sort((a,b)=>b-a);
}
function setReportYear(y){ reportYear = Number(y); render(); }
function displayYear(g){ return DB.business.yearMode==='be' ? g+543 : g; }

function renderReport(c,ta){
  const docs = realizedDocs().filter(d=> new Date(docTaxDate(d)).getFullYear()===reportYear);
  const thb = docs.filter(d=> docCurrency(d)==='THB');
  const agg = {subtotal:0,vat:0,wht:0,grand:0,net:0,count:thb.length};
  const byMonth = Array.from({length:12},()=>0);
  const byClient = {};
  thb.forEach(d=>{
    const t=compute(d);
    agg.subtotal+=t.subtotal; agg.vat+=t.vatAmount; agg.wht+=t.whtAmount; agg.grand+=t.grandTotal; agg.net+=t.netPayable;
    byMonth[new Date(docTaxDate(d)).getMonth()] += t.grandTotal;
    const cl=clientById(d.clientId); const nm=cl?cl.name:'—';
    byClient[nm]=(byClient[nm]||0)+t.netPayable;
  });
  // foreign income, per currency
  const foreign={};
  docs.filter(d=> docCurrency(d)!=='THB').forEach(d=>{ const cur=docCurrency(d); const t=compute(d);
    foreign[cur]=foreign[cur]||{grand:0,net:0,count:0}; foreign[cur].grand+=t.grandTotal; foreign[cur].net+=t.netPayable; foreign[cur].count++; });

  // outstanding (unpaid invoices) issued this year — informational
  let outstanding=0;
  DB.documents.filter(d=> d.type==='invoice' && docCurrency(d)==='THB'
      && new Date(d.issueDate).getFullYear()===reportYear
      && (effectiveStatus(d)==='sent'||effectiveStatus(d)==='overdue'))
    .forEach(d=> outstanding += compute(d).netPayable);

  const years = reportYears();
  ta.innerHTML = `<button class="btn" onclick="exportReportCSV()">${ic('download')} ส่งออก CSV ปีนี้</button>`;

  const maxMonth = Math.max(1, ...byMonth);
  const clientRows = Object.entries(byClient).sort((a,b)=>b[1]-a[1]);

  c.innerHTML = `
    <div class="report-head">
      <div class="year-pick">
        <span>ปีภาษี</span>
        <select onchange="setReportYear(this.value)">
          ${years.map(y=>`<option value="${y}" ${y===reportYear?'selected':''}>${displayYear(y)}</option>`).join('')}
        </select>
        <span class="muted" style="font-size:11.5px">(ปฏิทิน ม.ค.–ธ.ค. · คิดจากใบเสร็จ/ใบกำกับภาษีที่ออกแล้ว)</span>
      </div>
    </div>

    ${!docs.length ? `<div class="empty"><div class="big">${ic('barChart',38)}</div>ยังไม่มีรายรับที่บันทึกในปี ${displayYear(reportYear)}</div>` : `
    <div class="report-cards">
      <div class="rc"><div class="rl">รายรับก่อน VAT</div><div class="rv">${fmtMoneyC(agg.subtotal,'THB')}</div><div class="rs">ฐานเงินได้ (${agg.count} ใบเสร็จ)</div></div>
      <div class="rc"><div class="rl">VAT ขาย (ออกให้ลูกค้า)</div><div class="rv">${fmtMoneyC(agg.vat,'THB')}</div><div class="rs">ภาษีขายที่เก็บแทนสรรพากร</div></div>
      <div class="rc accent"><div class="rl">ยอดรวมทั้งสิ้น</div><div class="rv">${fmtMoneyC(agg.grand,'THB')}</div><div class="rs">ก่อนหักภาษี ณ ที่จ่าย</div></div>
      <div class="rc"><div class="rl">ถูกหัก ณ ที่จ่าย</div><div class="rv">−${fmtMoneyC(agg.wht,'THB')}</div><div class="rs">เครดิตภาษี — ใช้ใบ 50 ทวิ ยื่นภงด.</div></div>
      <div class="rc net"><div class="rl">รับสุทธิเข้าบัญชี</div><div class="rv">${fmtMoneyC(agg.net,'THB')}</div><div class="rs">หลังหักภาษี ณ ที่จ่าย</div></div>
      <div class="rc"><div class="rl">ค้างรับ (บิลปีนี้)</div><div class="rv">${fmtMoneyC(outstanding,'THB')}</div><div class="rs">ใบแจ้งหนี้ที่ยังไม่ชำระ</div></div>
    </div>

    ${Object.keys(foreign).length?`<div class="fx-row" style="margin-top:16px">
      ${Object.entries(foreign).map(([cur,f])=>`<div class="fx-chip"><span class="fx-cur">${cur}</span>
        <span class="fx-pair"><span class="fx-l">รวม</span> ${fmtMoneyC(f.grand,cur)}</span>
        <span class="fx-pair"><span class="fx-l">รับสุทธิ</span> ${fmtMoneyC(f.net,cur)}</span>
        <span class="fx-pair"><span class="fx-l">เอกสาร</span> ${f.count}</span></div>`).join('')}
    </div>`:''}

    <div class="report-grid">
      <div class="chart-card">
        <div class="ch-title">รายรับรายเดือน (ยอดรวม, บาท)</div>
        <div class="rmonths">
          ${byMonth.map((v,i)=>`<div class="rmonth"><div class="rbar-wrap"><div class="rbar" style="height:${Math.round(v/maxMonth*100)}%" title="${money(v)}"></div></div><div class="rm-l">${THAI_MONTHS[i].replace('.','')}</div></div>`).join('')}
        </div>
      </div>
      <div class="chart-card">
        <div class="ch-title">รายรับสุทธิตามลูกค้า</div>
        <table class="rclient"><tbody>
          ${clientRows.length?clientRows.map(([nm,v])=>`<tr><td>${escapeHtml(nm)}</td><td class="num">${fmtMoneyC(v,'THB')}</td></tr>`).join(''):'<tr><td class="muted">—</td><td></td></tr>'}
        </tbody></table>
      </div>
    </div>`}
  `;
}
function exportReportCSV(){
  const docs = realizedDocs().filter(d=> new Date(docTaxDate(d)).getFullYear()===reportYear)
    .sort((a,b)=> docTaxDate(a).localeCompare(docTaxDate(b)));
  const head=['เลขที่','ประเภท','วันที่','ลูกค้า','เลขผู้เสียภาษี','สกุลเงิน','ก่อนVAT','VAT','รวม','หักณที่จ่าย','สุทธิ'];
  const rows=docs.map(d=>{ const t=compute(d); const cl=clientById(d.clientId);
    return [d.number,TYPE_LABEL[d.type].th,docTaxDate(d),cl?cl.name:'',cl?cl.taxId||'':'',t.currency,
      t.subtotal.toFixed(2),t.vatAmount.toFixed(2),t.grandTotal.toFixed(2),t.whtAmount.toFixed(2),t.netPayable.toFixed(2)].map(csvCell).join(',');
  });
  downloadFile('﻿'+[head.join(','),...rows].join('\n'), 'tax-summary-'+displayYear(reportYear)+'.csv', 'text/csv;charset=utf-8');
}

/* ---------- brand color (corporate theming) ---------- */
const BRAND_PRESETS = [
  {name:'เขียวมรกต (ค่าเริ่มต้น)',hex:'#1f5d43'},
  {name:'น้ำเงินเข้ม',hex:'#1f4e79'},
  {name:'ฟ้าเทอควอยซ์',hex:'#0f6e7d'},
  {name:'คราม',hex:'#3b3a86'},
  {name:'ม่วงพลัม',hex:'#6a2e6b'},
  {name:'แดงเบอร์กันดี',hex:'#8c2f2a'},
  {name:'ส้มอิฐ',hex:'#a4541f'},
  {name:'บรอนซ์ทอง',hex:'#7a5a1a'},
  {name:'เทาถ่าน',hex:'#3a3f44'}
];
function validHex(s){ return /^#[0-9a-fA-F]{6}$/.test(String(s||'').trim()); }
// Live-preview a brand color without committing it; keeps the two inputs + swatches in sync.
function previewBrand(val){
  val = String(val||'').trim();
  if(val && val[0]!=='#') val = '#'+val;
  const hexEl=document.getElementById('s_brandHex'), colEl=document.getElementById('s_brand');
  if(hexEl && document.activeElement!==hexEl) hexEl.value = val;
  if(validHex(val)){
    if(colEl) colEl.value = val;
    applyTheme(val);
    document.querySelectorAll('#brandPresets button').forEach(btn=>{
      const on = btn.style.background.replace(/\s/g,'')!=='' && rgbToHex(btn.style.background)===val.toLowerCase();
      btn.style.borderColor = on ? 'var(--text)' : 'var(--border)';
    });
  }
}
function setBrandPreset(hex){
  const colEl=document.getElementById('s_brand'), hexEl=document.getElementById('s_brandHex');
  if(colEl) colEl.value=hex; if(hexEl) hexEl.value=hex;
  previewBrand(hex);
}
// browsers normalize style.background to rgb(...) — convert for swatch matching.
function rgbToHex(s){
  const m=String(s).match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/i);
  if(!m) return String(s).toLowerCase();
  return '#'+[1,2,3].map(i=>Number(m[i]).toString(16).padStart(2,'0')).join('');
}
function pickAsset(key){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
  inp.onchange=()=>{ const f=inp.files[0]; if(!f) return;
    const r=new FileReader(); r.onload=()=>{ DB.business[key]=r.result; persist(true); render(); }; r.readAsDataURL(f);
  }; inp.click();
}
function removeAsset(key){ DB.business[key]=''; persist(true); render(); }
// Live preview of the PromptPay QR while typing the ID in settings.
function previewPromptpay(val){
  const el=document.getElementById('ppHint'); if(!el) return;
  const payload = promptpayPayload(val, null);
  el.innerHTML = payload
    ? `<div style="width:84px;height:84px">${qrSvg(payload,84)}</div><span style="color:var(--accent)">${ic('check')} ใช้ได้ — QR นี้จะแสดงบนใบแจ้งหนี้ (สกุลเงินบาท)</span>`
    : (val.replace(/\D/g,'') ? `<span style="color:var(--amber)">${ic('alert')} ต้องเป็นเบอร์มือถือ 10 หลัก หรือเลข 13 หลัก</span>` : '');
}
function saveSettings(){
  const b=DB.business; const v=id=>document.getElementById(id);
  b.businessName=v('s_name').value; b.businessNameEn=v('s_nameEn').value;
  b.address=v('s_addr').value; b.taxId=v('s_taxid').value;
  b.phone=v('s_phone').value; b.email=v('s_email').value;
  b.bankName=v('s_bankName').value; b.bankAccount=v('s_bankAcc').value; b.bankAccountName=v('s_bankAccName').value;
  b.promptpayId=v('s_promptpay').value.trim();
  const brand=(v('s_brand')&&v('s_brand').value)||b.brandColor||'#1f5d43';
  b.brandColor = validHex(brand) ? brand.toLowerCase() : '#1f5d43';
  b.isVatRegistered=v('s_vat').checked;
  b.defaultVatRate=Number(v('s_vatRate').value)||0; b.defaultWhtRate=Number(v('s_whtRate').value)||0;
  b.currency=v('s_cur').value; b.defaultTerms=v('s_terms').value;
  b.yearMode=v('s_year').value; b.lang=v('s_lang').value;
  b.numberFormats.quotation=v('s_fmt_q').value; b.numberFormats.invoice=v('s_fmt_i').value;
  b.numberFormats.receipt=v('s_fmt_r').value; b.numberFormats.tax_invoice=v('s_fmt_t').value;
  persist(); applyTheme(); toast('บันทึกการตั้งค่าแล้ว','ok');
}

function saveClient(id){
  const v=x=>document.getElementById(x).value.trim();
  const name=v('c_name');
  if(!name){ toast('กรุณากรอกชื่อลูกค้า','err'); return; }
  const data={name,contactPerson:v('c_contact'),taxId:v('c_taxid'),address:v('c_addr'),
    email:v('c_email'),phone:v('c_phone'),defaultWht:document.getElementById('c_wht').checked,notes:v('c_notes')};
  if(id){ Object.assign(clientById(id),data); }
  else{ DB.clients.push({id:uid(),...data}); }
  persist(); closeModal(); render(); toast('บันทึกลูกค้าแล้ว','ok');
}
function deleteClient(id){
  const used = DB.documents.some(d=>d.clientId===id);
  if(used){ toast('ลบไม่ได้ — มีเอกสารผูกกับลูกค้านี้อยู่','err'); return; }
  if(!confirm('ลบลูกค้ารายนี้?')) return;
  DB.clients=DB.clients.filter(c=>c.id!==id);
  persist(); closeModal(); render();
}

let editDoc = null;
function openDocEditor(type, existingId, presetItems, parentId){
  if(!DB.clients.length){
    toast('เพิ่มลูกค้าก่อนออกเอกสาร','err'); setView('clients'); return;
  }
  if(existingId){
    editDoc = JSON.parse(JSON.stringify(DB.documents.find(d=>d.id===existingId)));
  }else{
    const firstClient = DB.clients[0];
    editDoc = {
      id:null, type, number:null, clientId:firstClient.id, parentId:parentId||null,
      issueDate:todayISO(), dueDate:addDays(todayISO(),30), paidDate:null,
      status:'draft', project:'', currency: DB.business.currency||'THB',
      items: presetItems || [{description:'',qty:1,unit:'',price:0}],
      vatRate: DB.business.isVatRegistered? DB.business.defaultVatRate:0,
      whtRate: (firstClient.defaultWht!==false)? DB.business.defaultWhtRate:0,
      notes:''
    };
  }
  drawDocEditor();
  openModal();
}

function refreshTaxPath(){
  const d=editDoc;
  document.getElementById('dueWrap').style.display = d.type==='invoice'?'':'none';
  document.getElementById('paidWrap').style.display = (d.type==='receipt'||d.type==='tax_invoice')?'':'none';
}
function editField(k,v){ editDoc[k]=v; if(k==='type') refreshTaxPath(); }
function onClientChange(){
  const cl=clientById(editDoc.clientId);
  if(cl){ editDoc.whtRate = (cl.defaultWht!==false)? DB.business.defaultWhtRate:0; drawDocEditor(); }
}
function setWht(r){ editDoc.whtRate=r;
  document.querySelectorAll('#whtPills button').forEach(b=>b.classList.toggle('on', b.textContent===r+'%'));
  drawLadder();
}
function setDocCurrency(cur){ editDoc.currency=cur; drawDocEditor(); }
function drawItems(){
  const body=document.getElementById('itemsBody');
  body.innerHTML = editDoc.items.map((it,i)=>`
    <tr>
      <td><input value="${attr(it.description)}" placeholder="ค่าบริการ / ค่าที่ปรึกษา" oninput="updItem(${i},'description',this.value)"></td>
      <td><input type="number" value="${it.qty}" oninput="updItem(${i},'qty',this.value)" style="text-align:right"></td>
      <td><input value="${attr(it.unit)}" placeholder="งาน" oninput="updItem(${i},'unit',this.value)"></td>
      <td><input type="number" value="${it.price}" oninput="updItem(${i},'price',this.value)" style="text-align:right"></td>
      <td style="text-align:right;font-variant-numeric:tabular-nums;padding-right:10px">${money((Number(it.qty)||0)*(Number(it.price)||0))}</td>
      <td><button class="del" onclick="delItem(${i})">×</button></td>
    </tr>`).join('');
}
function addItem(){ editDoc.items.push({description:'',qty:1,unit:'',price:0}); drawItems(); drawLadder(); }
function delItem(i){ editDoc.items.splice(i,1); if(!editDoc.items.length) addItem(); drawItems(); drawLadder(); }
function updItem(i,k,v){ editDoc.items[i][k]= (k==='qty'||k==='price')? v : v;
  // update row total + ladder live
  drawItemTotal(i); drawLadder();
}
function drawItemTotal(i){
  const body=document.getElementById('itemsBody');
  const it=editDoc.items[i];
  const cell=body.children[i]?.children[4];
  if(cell) cell.textContent = money((Number(it.qty)||0)*(Number(it.price)||0));
}
function drawLadder(){
  const t=compute(editDoc); const el=document.getElementById('ladder');
  const b=DB.business; const M=n=>fmtMoneyC(n,t.currency);
  el.innerHTML = `
    <div class="row"><span class="lbl">รวมเป็นเงิน</span><span class="amt">${M(t.subtotal)}</span></div>
    ${b.isVatRegistered && t.vatRate>0?`<div class="row"><span class="lbl">VAT ${t.vatRate}%</span><span class="amt">${M(t.vatAmount)}</span></div>`:''}
    <div class="row sub grand"><span class="lbl">ยอดรวมทั้งสิ้น</span><span class="amt">${M(t.grandTotal)}</span></div>
    ${t.whtRate>0?`<div class="row minus"><span class="lbl">หัก ณ ที่จ่าย ${t.whtRate}%</span><span class="amt">−${money(t.whtAmount)}</span></div>`:''}
    <div class="row net"><span class="lbl">ยอดชำระสุทธิ</span><span class="amt">${M(t.netPayable)}</span></div>
  `;
}
function saveDoc(){
  const d=editDoc;
  d.items = d.items.filter(it=> (it.description||'').trim() || Number(it.price)>0 );
  if(!d.items.length){ toast('เพิ่มอย่างน้อยหนึ่งรายการ','err'); return; }
  // tax invoice guardrail
  if(d.type==='tax_invoice'){
    const cl=clientById(d.clientId);
    if(!cl.taxId){ toast('ออกใบกำกับภาษีไม่ได้ — ลูกค้ายังไม่มีเลขประจำตัวผู้เสียภาษี','err');
      if(confirm('ลูกค้ายังไม่มีเลขภาษี ต้องการเพิ่มตอนนี้?')){ closeModal(); openClientEditor(cl.id); } return; }
  }
  if(d.id){
    const idx=DB.documents.findIndex(x=>x.id===d.id);
    DB.documents[idx]=d;
  }else{
    d.id=uid(); d.createdAt=new Date().toISOString();
    d.number = nextNumber(d.type, d.issueDate);
    commitNumber(d.type, d.issueDate);
    if(d.type==='receipt'||d.type==='tax_invoice'){ d.status='issued'; if(!d.paidDate) d.paidDate=todayISO(); }
    DB.documents.push(d);
  }
  persist(); closeModal(); viewDoc(d.id);
  toast('บันทึกเอกสารแล้ว','ok');
}
function deleteDoc(id){
  if(!confirm('ลบเอกสารนี้?')) return;
  DB.documents=DB.documents.filter(d=>d.id!==id);
  persist(); closeModal(); setView('documents');
}

let viewingId=null;
function viewDoc(id){ viewingId=id; currentView='docview';

  render();

function renderDocView(c,ta){
  const d=DB.documents.find(x=>x.id===viewingId);
  if(!d){ setView('documents'); return; }
  const cl=clientById(d.clientId); const t=compute(d); const st=effectiveStatus(d);
  document.getElementById('pageTitle').textContent = d.number;

  // contextual actions
  let actions = `<button class="btn btn-ghost" onclick="setView('documents')">${ic('arrowLeft')} กลับ</button>`;
  ta.innerHTML = actions;

  let lifecycle='';
  if(d.type==='quotation'){
    if(d.status==='draft') lifecycle+=`<button class="btn" onclick="setStatus('${d.id}','sent')">ทำเครื่องหมายว่าส่งแล้ว</button>`;
    if(d.status==='sent'){ lifecycle+=`<button class="btn" onclick="setStatus('${d.id}','accepted')">ลูกค้าตอบรับ</button>
      <button class="btn btn-danger" onclick="setStatus('${d.id}','declined')">ลูกค้าปฏิเสธ</button>`; }
    if(d.status==='accepted'||d.status==='sent') lifecycle+=`<button class="btn btn-primary" onclick="convertToInvoice('${d.id}')">${ic('arrowRight')} แปลงเป็นใบแจ้งหนี้</button>`;
  }
  if(d.type==='invoice'){
    if(d.status==='draft') lifecycle+=`<button class="btn" onclick="setStatus('${d.id}','sent')">ทำเครื่องหมายว่าส่งแล้ว</button>`;
    if(d.status==='sent'||st==='overdue') lifecycle+=`<button class="btn btn-primary" onclick="setStatus('${d.id}','paid')">${ic('check')} บันทึกรับชำระ</button>`;
    if(d.status==='paid') lifecycle+=`<button class="btn btn-primary" onclick="createReceipt('${d.id}')">${ic('arrowRight')} ออกใบเสร็จ/ใบกำกับภาษี</button>`;
  }

  c.innerHTML = `

      <span style="display:flex;align-items:center;margin-right:6px">${statusBadge(st)}</span>
      ${lifecycle}
      <span style="flex:1"></span>

      <button class="btn" onclick="openDocEditor('${d.type}','${d.id}')">${ic('pencil')} แก้ไข</button>
      <button class="btn" onclick="duplicateDoc('${d.id}')">${ic('copy')} ทำสำเนา</button>
      <button class="btn btn-danger" onclick="deleteDoc('${d.id}')">${ic('trash')} ลบ</button>
    </div>
    ${docTrail(d)}
    ${renderPaper(d,cl,t)}
  `;
}
// Show the lineage: which document this was created from, and what it led to.
function docTrail(d){
  const parent = d.parentId ? DB.documents.find(x=>x.id===d.parentId) : null;
  const children = DB.documents.filter(x=>x.parentId===d.id);
  if(!parent && !children.length) return '';
  const chip = doc => `<a class="trail-chip" onclick="viewDoc('${doc.id}')">${TYPE_LABEL[doc.type].th} <b>${escapeHtml(doc.number)}</b></a>`;
  let parts=[];
  if(parent) parts.push(`<span class="trail-l">สร้างจาก</span>${chip(parent)}`);
  if(children.length) parts.push(`<span class="trail-l">${ic('arrowRight')} นำไปออก</span>${children.map(chip).join('')}`);
  return `<div class="doc-trail">${parts.join('<span class="trail-sep"></span>')}</div>`;
}

// Issuer signature + company stamp, overlaid above a signature line.
function signMark(b){
  if(!b.signature && !b.stamp) return '';
  return `${b.stamp?`<img class="stamp" src="${b.stamp}">`:''}${b.signature?`<img class="sig" src="${b.signature}">`:''}`;
}

/* ---------- lifecycle actions ---------- */
function setStatus(id,st){
  const d=DB.documents.find(x=>x.id===id);
  d.status=st;
  if(st==='paid' && !d.paidDate) d.paidDate=todayISO();
  persist(); render();
  toast('อัปเดตสถานะ: '+(STATUS_LABEL[st]||st),'ok');
}
function convertToInvoice(id){
  const q=DB.documents.find(x=>x.id===id);
  q.status='accepted';
  const inv={
    id:uid(), type:'invoice', number:nextNumber('invoice',todayISO()),
    clientId:q.clientId, parentId:q.id, issueDate:todayISO(), dueDate:addDays(todayISO(),30),
    paidDate:null, status:'draft', project:q.project, currency:docCurrency(q),
    items:JSON.parse(JSON.stringify(q.items)), vatRate:q.vatRate, whtRate:q.whtRate,
    notes:q.notes, createdAt:new Date().toISOString()
  };
  commitNumber('invoice',todayISO());
  DB.documents.push(inv);
  persist(); viewDoc(inv.id);
  toast('สร้างใบแจ้งหนี้จากใบเสนอราคาแล้ว','ok');
}
function createReceipt(id){
  const inv=DB.documents.find(x=>x.id===id);
  const cl=clientById(inv.clientId);
  const asTax = DB.business.isVatRegistered;
  if(asTax && !cl.taxId){
    if(confirm('ลูกค้ายังไม่มีเลขภาษี — ออกได้เฉพาะใบเสร็จธรรมดา (ไม่ใช่ใบกำกับภาษี)\nต้องการเพิ่มเลขภาษีก่อน?')){
      openClientEditor(cl.id); return;
    }
  }
  const type = (asTax && cl.taxId)? 'tax_invoice':'receipt';
  const rec={
    id:uid(), type, number:nextNumber(type,todayISO()),
    clientId:inv.clientId, parentId:inv.id, issueDate:todayISO(),
    dueDate:null, paidDate:inv.paidDate||todayISO(), status:'issued', project:inv.project, currency:docCurrency(inv),
    items:JSON.parse(JSON.stringify(inv.items)), vatRate:inv.vatRate, whtRate:inv.whtRate,
    notes:inv.notes, createdAt:new Date().toISOString()
  };
  commitNumber(type,todayISO());
  DB.documents.push(rec);
  persist(); viewDoc(rec.id);
  toast(type==='tax_invoice'?'ออกใบเสร็จ/ใบกำกับภาษีแล้ว':'ออกใบเสร็จแล้ว','ok');
}
function duplicateDoc(id){
  const src=DB.documents.find(x=>x.id===id);
  const copy=JSON.parse(JSON.stringify(src));
  copy.id=uid(); copy.parentId=null; copy.issueDate=todayISO();
  copy.createdAt=new Date().toISOString();
  copy.status = (copy.type==='receipt'||copy.type==='tax_invoice')?'issued':'draft';
  if(copy.type==='invoice') copy.dueDate=addDays(todayISO(),30);
  if(copy.type==='receipt'||copy.type==='tax_invoice') copy.paidDate=todayISO();
  copy.number=nextNumber(copy.type,copy.issueDate);
  commitNumber(copy.type,copy.issueDate);
  DB.documents.push(copy);
  persist(); viewDoc(copy.id);
  toast('ทำสำเนาแล้ว','ok');
}

/* ============================================================
   MODAL utils
   ============================================================ */
function openModal(){ document.getElementById('overlay').classList.add('open'); }
function closeModal(){ document.getElementById('overlay').classList.remove('open'); document.getElementById('modal').innerHTML=''; }
document.getElementById('overlay').addEventListener('mousedown',e=>{ if(e.target.id==='overlay') closeModal(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

/* ---------- escaping ---------- */
function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function attr(s){ return escapeHtml(s).replace(/"/g,'&quot;'); }

/* ============================================================
   BOOT
   ============================================================ */
async function boot(){
  // Desktop app: load from the native store and we're done.
  if(IS_ELECTRON){
    try{ const t = await window.billingAPI.load(); DB = migrate(t ? JSON.parse(t) : blankDB()); }
    catch(e){ DB = blankDB(); }
    try{ dataLoc = await window.billingAPI.where(); }catch(e){}
    if(window.billingAPI.onMenuExport) window.billingAPI.onMenuExport(()=>elExport());
    if(window.billingAPI.onMenuImport) window.billingAPI.onMenuImport(()=>elImport());
    applyTheme();
    updateFileStatus();
    setView('dashboard');
    return;
  }

  // 1) Show cached data immediately so the UI is never empty.
  DB = migrate(loadLocal() || blankDB());
  applyTheme();
  updateFileStatus();
  setView('dashboard');

  // 2) Try to reconnect the billing.json from a previous session (source of truth).
  if(supportsFSA){
    try{
      const h = await idbGet(HANDLE_KEY);
      if(h){
        const perm = await h.queryPermission({mode:'readwrite'});
        if(perm==='granted'){
          fileHandle = h;
          await loadFromHandle();   // file overrides the cache
          render();
        }else{
          // Browser needs a click to re-grant file access (common on file:// pages).
          pendingHandle = h;
        }
        updateFileStatus();
      }
    }catch(e){/* no saved handle */}
  }

  window.addEventListener('beforeunload',e=>{ if(dirty && fileHandle){ e.preventDefault(); e.returnValue=''; } });
}
// paint the static sidebar nav icons
document.querySelectorAll('.nav .ico[data-ic]').forEach(s=> s.innerHTML = ic(s.dataset.ic,18));
boot();
</script>
